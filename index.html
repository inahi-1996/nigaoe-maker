<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>似顔絵メーカー</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>
<body>

  <!-- ローディングオーバーレイ（WithMeと同じ） -->
  <div id="loading-overlay" class="hidden">
    <div class="loader"></div>
  </div>
  <div id="app">

    <!-- ヘッダー -->
    <header class="header is-hidden">
      <button id="btnHome" class="header__title" type="button" aria-label="TOPに戺る">
        <img class="logo-img logo-img--header" src="assets/logo/logo.svg" alt="似顔絵メーカー" />
      </button>
      <span class="header__credit">Made with 💚 <a href="https://stone-pocket-ebe.notion.site" target="_blank" style="color:#23B470; text-decoration:underline; font-weight:700;">@hi_ki_illustration<span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle; margin-left:2px;">open_in_new</span></a></span>
    </header>

    <!-- TOP（最初の注意書き） -->
    <section id="topScreen" class="top screen is-visible">

      <!-- 背景：静止タイルパターン -->
      <div class="bg-tile" aria-hidden="true">
        <!-- 01〜23を創3周分並べて画面を埋める -->
        <img src="assets/TOP/01.png" alt="" /><img src="assets/TOP/02.png" alt="" /><img src="assets/TOP/03.png" alt="" /><img src="assets/TOP/04.png" alt="" /><img src="assets/TOP/05.png" alt="" /><img src="assets/TOP/06.png" alt="" /><img src="assets/TOP/07.png" alt="" /><img src="assets/TOP/08.png" alt="" /><img src="assets/TOP/09.png" alt="" /><img src="assets/TOP/10.png" alt="" /><img src="assets/TOP/11.png" alt="" /><img src="assets/TOP/12.png" alt="" /><img src="assets/TOP/13.png" alt="" /><img src="assets/TOP/14.png" alt="" /><img src="assets/TOP/15.png" alt="" /><img src="assets/TOP/16.png" alt="" /><img src="assets/TOP/17.png" alt="" /><img src="assets/TOP/18.png" alt="" /><img src="assets/TOP/19.png" alt="" /><img src="assets/TOP/20.png" alt="" /><img src="assets/TOP/21.png" alt="" /><img src="assets/TOP/22.png" alt="" /><img src="assets/TOP/23.png" alt="" />
        <img src="assets/TOP/01.png" alt="" /><img src="assets/TOP/02.png" alt="" /><img src="assets/TOP/03.png" alt="" /><img src="assets/TOP/04.png" alt="" /><img src="assets/TOP/05.png" alt="" /><img src="assets/TOP/06.png" alt="" /><img src="assets/TOP/07.png" alt="" /><img src="assets/TOP/08.png" alt="" /><img src="assets/TOP/09.png" alt="" /><img src="assets/TOP/10.png" alt="" /><img src="assets/TOP/11.png" alt="" /><img src="assets/TOP/12.png" alt="" /><img src="assets/TOP/13.png" alt="" /><img src="assets/TOP/14.png" alt="" /><img src="assets/TOP/15.png" alt="" /><img src="assets/TOP/16.png" alt="" /><img src="assets/TOP/17.png" alt="" /><img src="assets/TOP/18.png" alt="" /><img src="assets/TOP/19.png" alt="" /><img src="assets/TOP/20.png" alt="" /><img src="assets/TOP/21.png" alt="" /><img src="assets/TOP/22.png" alt="" /><img src="assets/TOP/23.png" alt="" />
        <img src="assets/TOP/01.png" alt="" /><img src="assets/TOP/02.png" alt="" /><img src="assets/TOP/03.png" alt="" /><img src="assets/TOP/04.png" alt="" /><img src="assets/TOP/05.png" alt="" /><img src="assets/TOP/06.png" alt="" /><img src="assets/TOP/07.png" alt="" /><img src="assets/TOP/08.png" alt="" /><img src="assets/TOP/09.png" alt="" /><img src="assets/TOP/10.png" alt="" /><img src="assets/TOP/11.png" alt="" /><img src="assets/TOP/12.png" alt="" /><img src="assets/TOP/13.png" alt="" /><img src="assets/TOP/14.png" alt="" /><img src="assets/TOP/15.png" alt="" /><img src="assets/TOP/16.png" alt="" /><img src="assets/TOP/17.png" alt="" /><img src="assets/TOP/18.png" alt="" /><img src="assets/TOP/19.png" alt="" /><img src="assets/TOP/20.png" alt="" /><img src="assets/TOP/21.png" alt="" /><img src="assets/TOP/22.png" alt="" /><img src="assets/TOP/23.png" alt="" />
      </div>

      <div class="top__inner">
        <div class="top__logo">
          <img class="logo-img logo-img--top" src="assets/logo/logo.svg" alt="似顔絵メーカー" />
        </div>
        <p class="top__desc">
          かんたん操作でにがおえ作成！レッツチャレンジ！
        </p>
        <button id="btnStart" class="top__cta">にがおえを作る</button>
      </div>

      <!-- TOP専用フッター（画面右下固定） -->
      <div class="top-footer">
        Made with 💚 <a href="https://stone-pocket-ebe.notion.site" target="_blank" style="color:#23B470; text-decoration:underline; font-weight:700;">@hi_ki_illustration<span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle; margin-left:2px;">open_in_new</span></a>
      </div>
    </section>

    <div id="makerScreen" class="main-content screen is-hidden">

      <!-- プレビューエリア -->
      <div class="preview-wrap">
        <canvas id="preview" class="preview"></canvas>
        <button id="btnDone" class="btn-done">共有する</button>
      </div>

      <!-- 右パネル（タブ＋グリッド） -->
      <div class="right-panel">

        <!-- カテゴリタブ -->
        <div class="tabs" role="group" aria-label="パーツカテゴリ">
          <button class="chip is-active" data-cat="hair">髪</button>
          <button class="chip" data-cat="eyebrows">眉毛</button>
          <button class="chip" data-cat="eyes">目</button>
          <button class="chip" data-cat="nose">鼻</button>
          <button class="chip" data-cat="mouth">口</button>
          <button class="chip" data-cat="color">カラー</button>
        </div>

        <!-- パーツ選択グリッド -->
        <div class="part-scroll">
          <div id="partGrid" class="part-grid"></div>
        </div>
        <!-- カラー選択 -->
        <div id="colorPanel" class="color-panel" hidden>
          <div class="palette" role="group" aria-label="カラー選択">
            <button class="palette__dot" data-color="#23B470" aria-label="#23B470" style="--c:#23B470"></button>
            <button class="palette__dot" data-color="#FB594C" aria-label="#FB594C" style="--c:#FB594C"></button>
            <button class="palette__dot" data-color="#2A5CCF" aria-label="#2A5CCF" style="--c:#2A5CCF"></button>
            <button class="palette__dot" data-color="#F3A5C7" aria-label="#F3A5C7" style="--c:#F3A5C7"></button>
            <button class="palette__dot is-selected" data-color="#000000" aria-label="#000000（デフォルト）" style="--c:#000000"></button>
          </div>
        </div>

      </div>
    </div>

    <!-- トースト -->
    <div id="toast" class="toast" hidden>画像を保存しました</div>

  </div>
  <script src="main.js"></script>
</body>
</html>
